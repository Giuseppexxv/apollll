import { useState, useEffect, RefObject } from 'react';

export const useAutoTrailer = (ref: RefObject<HTMLElement>, delay: number = 5000) => {
  const [isCentered, setIsCentered] = useState(false);
  const [shouldPlay, setShouldPlay] = useState(false);

  useEffect(() => {
    const observer = new IntersectionObserver(
      (entries) => {
        entries.forEach((entry) => {
          const rect = entry.boundingClientRect;
          const viewportHeight = window.innerHeight;
          const viewportWidth = window.innerWidth;
          
          const elementVerticalCenter = rect.top + rect.height / 2;
          const viewportVerticalCenter = viewportHeight / 2;
          
          const elementHorizontalCenter = rect.left + rect.width / 2;
          const viewportHorizontalCenter = viewportWidth / 2;
          
          // Check if element is near center (either vertically or horizontally depending on layout)
          // For vertical lists (TodaySection), we care about vertical center
          // For horizontal carousels (UpcomingSection), we care about horizontal center
          const isNearVerticalCenter = Math.abs(elementVerticalCenter - viewportVerticalCenter) < viewportHeight * 0.2;
          const isNearHorizontalCenter = Math.abs(elementHorizontalCenter - viewportHorizontalCenter) < viewportWidth * 0.2;
          
          // An element is "centered" if it's near the center of the viewport in the primary scrolling direction
          // We'll consider it centered if it's near the center in at least one dimension while intersecting
          setIsCentered(entry.isIntersecting && (isNearVerticalCenter || isNearHorizontalCenter));
        });
      },
      {
        threshold: Array.from({ length: 21 }, (_, i) => i / 20), // 0, 0.05, 0.1, ..., 1.0
        rootMargin: '-10% 0px -10% 0px'
      }
    );

    if (ref.current) {
      observer.observe(ref.current);
    }

    return () => {
      if (ref.current) {
        observer.unobserve(ref.current);
      }
    };
  }, [ref]);

  useEffect(() => {
    let timer: NodeJS.Timeout;

    if (isCentered) {
      timer = setTimeout(() => {
        setShouldPlay(true);
      }, delay);
    } else {
      setShouldPlay(false);
    }

    return () => {
      if (timer) clearTimeout(timer);
    };
  }, [isCentered, delay]);

  return shouldPlay;
};
